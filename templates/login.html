<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../static/css/style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="stylesheet" href="../static/css/login.css" />
    <title>Login – Control Panel</title>
  </head>
  <body>
    <div class="login-wrapper">
      <div class="login-card">
        <!-- Logo / Icon -->
        <div class="login-icon mb-3">
          <i class="fa-solid fa-industry"></i>
        </div>

        <h4 class="text-center mb-1">Production Line</h4>
        <p class="text-center text-muted mb-4" style="font-size: 13px">
          Control Panel Access
        </p>

        <!-- Error Alert -->
        <div class="alert alert-danger d-none" id="errorAlert" role="alert">
          <i class="fa-solid fa-circle-exclamation me-2"></i>
          <span id="errorMsg">Wrong password. Try again.</span>
        </div>

        <form id="loginForm" novalidate>
          <div class="mb-3">
            <label class="form-label" for="password">Password</label>
            <div class="input-group">
              <span class="input-group-text"
                ><i class="fa-solid fa-lock"></i
              ></span>
              <input
                type="password"
                class="form-control"
                id="password"
                placeholder="Enter password"
                autocomplete="current-password"
                autofocus
              />
              <button
                type="button"
                class="input-group-text"
                id="togglePwd"
                style="cursor: pointer"
              >
                <i class="fa-solid fa-eye" id="eyeIcon"></i>
              </button>
            </div>
          </div>

          <button
            type="submit"
            class="btn btn-primary w-100 mt-2"
            id="loginBtn"
          >
            <span id="btnText"
              ><i class="fa-solid fa-right-to-bracket me-2"></i>Login</span
            >
            <span id="btnSpinner" class="d-none">
              <span class="spinner-border spinner-border-sm me-2"></span>Logging
              in...
            </span>
          </button>
        </form>
      </div>
    </div>

    <script src="../static/js/auth.js"></script>
    <script src="../static/js/main.js"></script>
  </body>
</html>
