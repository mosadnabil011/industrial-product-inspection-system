<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../static/css/style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <title>Document</title>
    <style>
  

  #sidebar{
    width:250px;
  }

  

  section{
    min-height:100vh;
  }

  .nav-link.active{
    background:#0d6efd !important;
    color:#fff !important;
  }
</style>
  </head>
  <body
    class="dark"
    data-bs-spy="scroll"
    data-bs-target="#sidebarNav"
    data-bs-offset="100"
    tabindex="0"
  >
    <div class="d-flex">
      <!-- Sidebar -->
      <div
        class="bg-dark text-white p-3  transition-all position-fixed vh-100"
        id="sidebar"
        style="min-width: 250px"
      >
        <div class="d-flex justify-content-end mb-3">
          <button class="btn btn-outline-light btn-sm" id="btnCollapse">
            <i class="bi bi-list"></i> ☰
          </button>
        </div>
        <h4 class="text-center mb-4 sidebar-text">Control Panel</h4>
        <ul class="nav nav-pills flex-column mb-auto " id="sidebarNav">
          <li class="nav-item">
            <a
              href="#Dashboard"
              class="nav-link text-white d-flex align-items-center"
            >
              <span class="me-2"><i class="fa-solid fa-sliders"></i></span>
              <span class="sidebar-text">Dashboard</span>
            </a>
          </li>
          <li>
            <a
              href="#Live"
              class="nav-link text-white d-flex align-items-center"
            >
              <span class="me-2"><i class="fa-solid fa-tv"></i></span>
              <span class="sidebar-text">Live</span>
            </a>
          </li>
          <li>
            <a
              href="#Reports"
              class="nav-link text-white d-flex align-items-center"
            >
              <span class="me-2"><i class="fa-solid fa-chart-line"></i></span>
              <span class="sidebar-text">Reports</span>
            </a>
          </li>
        </ul>
        <div class="mt-3 sidebar-text">
          <h6 class="text-uppercase text-secondary">Line Status</h6>
          <div class="bg-secondary rounded p-3 mt-2">
            <p class="mb-1">
              Status:
              <span class="badge bg-success" id="lineStatus">Loading...</span>
            </p>
          </div>
        </div>
      </div>
      <!-- Main Content -->
      <div class="container " >

  <div class="main-content flex-grow-1">

   <section id="Dashboard" class="p-4">
  <div class="text-center Dashboard">
    <h2>Dashboard</h2>

    <div class="mt-2 row g-4">
      <div class="col-lg-3">
        <div class="card p-3 h-100">
          <h3 class="fs-5 opacity-75"> <i class="fa-solid fa-boxes-stacked"></i> Total Boxes</h3>
          <span class="fs-3 card-text text-black fw-bold" id="Total Boxes">...</span>
        </div>
      </div>
      <div class="col-lg-3">
        <div class="card p-3 h-100">
          <h3 class="fs-5 opacity-75"><i class="fa-solid fa-box-open text-success"></i> Valid Boxes</h3>
          <span class="fs-3 text-success fw-bold" id="Valid Boxes">...</span>
        </div>
      </div>
      <div class="col-lg-3">
        <div class="card p-3 h-100">
          <h3 class="fs-5 opacity-75"><i class="fa-solid fa-boxes-packing text-danger"></i> Invalid Boxes</h3>
          <span class="fs-3 text-danger fw-bold" id="Invalid Boxes">...</span>
        </div>
      </div>
      <div class="col-lg-3">
        <div class="card p-3 h-100">
          <h3 class="fs-5 opacity-75"><i class="fa-solid fa-exclamation-triangle text-warning"></i> Defect Rate</h3>
          <span class="fs-3 text-warning fw-bold" id="Defect Rate">...</span>
        </div>
      </div>
    </div>

    <div class="mt-4 row g-4">
      <div class="col-lg-9">
        <div class="row g-4">
          <div class="col-lg-12">
            <div class="card p-3 w-auto" style="height:200px;">
              <h4 class="fs-6"> 1</h4>
            </div>
          </div>
          <div class="col-lg-12">
            <div class="card p-3 " style="height:200px;">
              <h4 class="fs-6"> 2</h4>
            </div>
          </div>
        </div>
      </div>

      <div class="col-lg-3">
        <div class="card p-3 " style="height:420px;">
          <h4 class="fs-6">3</h4>
        </div>
      </div>
    </div>
  </div>
</section>

    

  <section id="Live" class=" p-4 ">
    <h2>Live Monitoring</h2>
  </section>

  <section id="Reports" class=" p-4">
    <h2>Reports</h2>
  </section>

</div>
    <button id="themeToggleBtn" class="theme-float">
      <i class="fa-solid fa-moon" id="themeIcon"></i>
    </button>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="../static/js/main.js"></script>
  </body>
</html>
